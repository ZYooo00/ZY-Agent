  .pd-group-chip { font-size:11px; color:#94A3B8; background:#F1F5F9; border-radius:99px; padding:2px 8px; white-space:nowrap; }

  .pd-chevron.collapsed { transform:rotate(-90deg); }

  .pd-num-input {

    font-variant-numeric:tabular-nums; border:1.5px solid #E2E8F0; border-radius:8px;
    background:#F8FAFC; color:#0F172A; outline:none; flex-shrink:0;

  }

  .pd-note-input {
    flex:1; min-width:70px; height:36px; font-size:12px;
    border:1.5px solid #E2E8F0; border-radius:8px;
    background:#F8FAFC; color:#475569; padding:0 8px; outline:none;
    font-family:'Noto Sans TC',sans-serif;
  }
  .pd-note-input:focus { border-color:#9590D0; background:#fff; }
  .pd-note-toggle {
    font-size:11px; color:#9590D0; background:#F5F3FF;
    border:1px solid #C4B5FD; border-radius:8px; padding:3px 8px;
    cursor:pointer; flex-shrink:0; white-space:nowrap; line-height:1.4;
  }
  .pd-note-toggle:active, .pd-note-toggle.open { background:#EDE9FA; }
  .pd-batch-info { font-size:11px; color:#CBD5E1; font-style:italic; flex:1; text-align:center; }
  .pd-badge { font-size:11px; font-weight:700; border-radius:99px; padding:3px 9px; min-width:38px; text-align:center; white-space:nowrap; flex-shrink:0; }
  .pd-progress-bar { height:5px; border-radius:99px; background:#E2E8F0; overflow:hidden; }

<script>

const LOCATION_ORDER = ['培養箱','冰箱','櫃1','櫃2','櫃3','精蟲室','半年一次','需要再叫'];
const LOCATION_ICONS = {
  '培養箱':'🧪', '冰箱':'🧊', '櫃1':'🗄️', '櫃2':'🗄️', '櫃3':'🗄️',
  '精蟲室':'🔬', '半年一次':'📅', '需要再叫':'🔔',
};
const LOCATION_COLLAPSED_SET = new Set(['培養箱','半年一次','需要再叫']);

const STOCK_GROUPS = (() => {
  const grouped = {};
  PRODUCTS.forEach(p => {
    if (!p.gupanId || !p.location) return;
    if (!grouped[p.location]) grouped[p.location] = [];
    grouped[p.location].push({ id:p.gupanId, name:p.name, unit:p.unit, target:p.target||0 });
  });
  return LOCATION_ORDER.filter(loc => grouped[loc]).map(loc => ({
    id: loc.replace(/[^a-z0-9一-鿿]/gi, '-').toLowerCase(),
    label: loc,
    icon: LOCATION_ICONS[loc] || '📦',
    collapsed: LOCATION_COLLAPSED_SET.has(loc),
    items: grouped[loc],
  }));
})();

const pdCollapsed = {};

function buildPandianGroups() {
  const total = STOCK_GROUPS.reduce((s, g) => s + g.items.length, 0);
  document.getElementById('pd-total').textContent = total;
  STOCK_GROUPS.forEach(g => {
    if (!(g.id in pdCollapsed)) pdCollapsed[g.id] = g.collapsed;
  });
  const container = document.getElementById('pd-groups');
  container.innerHTML = STOCK_GROUPS.map(g => {
    const isCollapsed = pdCollapsed[g.id];
    const itemsHtml = g.items.map(item => `
      <div class="pd-item-row flex-col items-start gap-1">
        <div class="flex items-center gap-2 w-full">
          <div class="pd-item-info flex-shrink-0" style="min-width:60px; max-width:90px;">
            <div class="pd-item-name">${item.name}</div>
            ${item.note ? `<div class="pd-item-note">${item.note}</div>` : ''}
          </div>
          <div class="pd-batch-info">—</div>
          <div class="flex flex-col items-center gap-0.5 flex-shrink-0">
            <input type="number" class="pd-num-input" id="pd-${item.id}"
              min="0" inputmode="numeric" placeholder="—"
              oninput="onPandianInput('${item.id}', this)">
            <span class="text-slate-300" style="font-size:10px">現有量</span>
          </div>
          <button class="pd-note-toggle" id="pd-notebtn-${item.id}"
            onclick="toggleMediumNote('${item.id}')">＋備註</button>
          <div class="pd-badge badge-none hidden" id="pd-badge-${item.id}">—</div>
        </div>
        <div class="hidden w-full" id="pd-note-wrap-${item.id}">
          <input type="text" class="pd-note-input" id="pd-note-${item.id}"
            placeholder="效期備註（效期 / 剩餘瓶數）" oninput="savePandianDraft()">
        </div>
      </div>`).join('');
    return `
    <div class="pd-group-card" id="pd-group-${g.id}">
      <div class="pd-group-header" onclick="togglePandianGroup('${g.id}')">
        <span class="pd-group-icon">${g.icon}</span>
        <span class="pd-group-title">${g.label}</span>
        <span class="pd-group-chip" id="pd-chip-${g.id}">0 / ${g.items.length}</span>
        <svg class="pd-chevron${isCollapsed ? ' collapsed' : ''}" id="pd-chev-${g.id}"
          width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>
      <div class="pd-group-body" id="pd-body-${g.id}" ${isCollapsed ? 'style="display:none"' : ''}>
        ${itemsHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleMediumNote(itemId) {
  const wrap = document.getElementById(`pd-note-wrap-${itemId}`);
  const btn  = document.getElementById(`pd-notebtn-${itemId}`);
  if (wrap) { const nowHidden = wrap.classList.toggle('hidden'); if (btn) btn.classList.toggle('open', !nowHidden); }
}

function togglePandianGroup(groupId) {
  const body = document.getElementById(`pd-body-${groupId}`);
  const chev = document.getElementById(`pd-chev-${groupId}`);
  const isNowCollapsed = body.style.display === 'none';
  body.style.display = isNowCollapsed ? '' : 'none';
  chev.classList.toggle('collapsed', !isNowCollapsed);
  pdCollapsed[groupId] = !isNowCollapsed;
}

function onPandianInput(itemId, input) {
  updatePandianProgress();
  savePandianDraft();
  const group = STOCK_GROUPS.find(g => g.items.some(it => it.id === itemId));
  if (group) updateGroupChip(group);
}

function updateGroupChip(group) {
  const filled = group.items.filter(it => {
    const el = document.getElementById(`pd-${it.id}`);
    return el && el.value !== '';
  }).length;
  const chip = document.getElementById(`pd-chip-${group.id}`);
  if (chip) chip.textContent = `${filled} / ${group.items.length}`;
}

function updatePandianProgress() {
  const allItems = STOCK_GROUPS.flatMap(g => g.items);
  const filled = allItems.filter(it => { const el = document.getElementById(`pd-${it.id}`); return el && el.value !== ''; }).length;
  const total  = allItems.length;
  document.getElementById('pd-filled').textContent = filled;
  document.getElementById('pd-progress').style.width = total ? `${(filled / total) * 100}%` : '0%';
}

function completePandian() {
  const staffEl = document.getElementById('pd-staff');
  if (!staffEl.value) {
    staffEl.closest('.card').scrollIntoView({ behavior:'smooth', block:'center' });
    staffEl.classList.add('ring-2','ring-red-400');
    setTimeout(() => staffEl.classList.remove('ring-2','ring-red-400'), 2000);
    showToast('請先選擇盤點人再完成盤點。', 'warn');
    return;
  }
  const allItems = STOCK_GROUPS.flatMap(g => g.items);
  const needReorder = allItems.filter(it => {
    const el = document.getElementById(`pd-${it.id}`);
    if (!el || el.value === '') return false;
    return parseFloat(el.value) < it.target;
  });
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const staffName = staffEl.value || '（未填）';
  document.getElementById('pd-result-count').textContent = needReorder.length;
  document.getElementById('pd-result-meta').textContent = `盤點時間：${dateStr} ${timeStr}　盤點人：${staffName}`;
  const list  = document.getElementById('pd-result-list');
  const empty = document.getElementById('pd-result-empty');
  if (needReorder.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    list.innerHTML = needReorder.map(it => {
      const actual = parseFloat(document.getElementById(`pd-${it.id}`).value);
      const badgeCls = actual === 0 ? 'badge-crit' : 'badge-warn';
      const badgeTxt = actual === 0 ? '缺貨' : '注意';
      return `<div class="pd-result-row">
        <div class="flex-1 min-w-0">
          <div class="pd-result-name">${it.name}</div>
          <div class="text-xs text-slate-400 mt-0.5">現有 ${actual} ${it.unit}　警戒線 ${it.target} ${it.unit}</div>
        </div>
        <span class="pd-badge ${badgeCls}">${badgeTxt}</span>
      </div>`;
    }).join('');
  }
  const pandianAllValues = allItems
    .filter(it => { const el = document.getElementById(`pd-${it.id}`); return el && el.value !== ''; })
    .map(it => ({
      id: it.id, name: it.name, unit: it.unit,
      actual: parseFloat(document.getElementById(`pd-${it.id}`).value),
      target: it.target,
      note: document.getElementById(`pd-note-${it.id}`)?.value || '',
    }));
  const pandianPayload = {
    date: dateStr, completedAt: timeStr, staff: staffName,
    summary: needReorder.map(it => ({
      id: it.id, name: it.name, unit: it.unit,
      actual: parseFloat(document.getElementById(`pd-${it.id}`).value),
      target: it.target,
    })),
    allValues: pandianAllValues,
  };
  try {
    localStorage.setItem('pandian-result', JSON.stringify(pandianPayload));
    const hist = JSON.parse(localStorage.getItem('pandian-history') || '[]');
    hist.push(pandianPayload);
    localStorage.setItem('pandian-history', JSON.stringify(hist));
    appendKucunLog(pandianAllValues.map(it => ({
      source: 'pandian', action: 'pandian',
      productId: it.id.replace(/^m-/, ''), productName: it.name,
      lotNumber: null, qty: it.actual,
      note: `盤點：${staffName}（${dateStr}）`,
    })));
  } catch(e) {}
  document.getElementById('pd-submit-area').classList.add('hidden');
  document.getElementById('pd-groups').classList.add('hidden');
  document.getElementById('pd-result').classList.remove('hidden');
  document.getElementById('pd-progress-card').classList.add('hidden');
  document.getElementById('pd-staff').closest('.card').classList.add('hidden');
}

function showPandianInput() {
  document.getElementById('pd-submit-area').classList.remove('hidden');
  document.getElementById('pd-groups').classList.remove('hidden');
  document.getElementById('pd-result').classList.add('hidden');
  document.getElementById('pd-progress-card').classList.remove('hidden');
  document.getElementById('pd-staff').closest('.card').classList.remove('hidden');
}

function backToPandian() { showPandianInput(); }

function newPandian() {
  if (!confirm('確定要清空所有數量、重新盤點？')) return;
  localStorage.removeItem('pandian-draft');
  STOCK_GROUPS.flatMap(g => g.items).forEach(it => {
    const el = document.getElementById(`pd-${it.id}`);
    if (el) el.value = '';
    const noteEl = document.getElementById(`pd-note-${it.id}`);
    if (noteEl) noteEl.value = '';
    const badge = document.getElementById(`pd-badge-${it.id}`);
    if (badge) { badge.className = 'pd-badge badge-none hidden'; badge.textContent = '—'; }
  });
  STOCK_GROUPS.forEach(g => updateGroupChip(g));
  updatePandianProgress();
  showPandianInput();
}

function resetPandian() { if (!confirm('確定要清除所有已填數量？')) return; newPandian(); }
function restartPandian() { newPandian(); }
function showTransferSuccess() { document.getElementById('pd-transfer-msg').classList.remove('hidden'); }

const PD_STORAGE_KEY = 'pandian-draft';

function savePandianDraft() {
  const values = {};
  const notes = {};
  STOCK_GROUPS.flatMap(g => g.items).forEach(it => {
    const el = document.getElementById(`pd-${it.id}`);
    if (el && el.value !== '') values[it.id] = el.value;
    const noteEl = document.getElementById(`pd-note-${it.id}`);
    if (noteEl && noteEl.value !== '') notes[it.id] = noteEl.value;
  });
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const staff = document.getElementById('pd-staff')?.value || '';
  try { localStorage.setItem(PD_STORAGE_KEY, JSON.stringify({ date: dateStr, values, notes, staff })); } catch(e) {}
  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const saveEl = document.getElementById('pd-last-save');
  if (saveEl) saveEl.textContent = `自動儲存 ${t}`;
}

function loadPandianDraft() {
  let data;
  try { data = JSON.parse(localStorage.getItem(PD_STORAGE_KEY) || 'null'); } catch(e) {}
  if (!data) return;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  if (data.date !== todayStr) { localStorage.removeItem(PD_STORAGE_KEY); return; }
  if (data.staff) { const staffEl = document.getElementById('pd-staff'); if (staffEl) staffEl.value = data.staff; }
  if (data.values) {
    Object.entries(data.values).forEach(([id, val]) => {
      const el = document.getElementById(`pd-${id}`);
      if (el) { el.value = val; onPandianInput(id, el); }
    });
  }
  if (data.notes) {
    Object.entries(data.notes).forEach(([id, val]) => {
      const el = document.getElementById(`pd-note-${id}`);
      if (el) el.value = val;
    });
  }
}

function openNav()  { document.getElementById('nav-overlay').classList.add('open'); document.getElementById('nav-drawer').classList.add('open'); }
function closeNav() { document.getElementById('nav-overlay').classList.remove('open'); document.getElementById('nav-drawer').classList.remove('open'); }

(function init() {
  const d = new Date();
  const el = document.getElementById('today-display');
  if (el) el.textContent = d.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
  buildPandianGroups();
  loadPandianDraft();
})();

</script>
